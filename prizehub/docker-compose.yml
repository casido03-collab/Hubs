services:
  bot:
    build: .
    container_name: prizehub_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - prizehub_net

  postgres:
    image: postgres:16-alpine
    container_name: prizehub_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - prizehub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - prizehub_net

  redis:
    image: redis:7-alpine
    container_name: prizehub_redis
    restart: unless-stopped
    command: redis-server
    volumes:
      - prizehub_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - prizehub_net

volumes:
  prizehub_pgdata:
  prizehub_redis_data:

networks:
  prizehub_net:
    name: prizehub_net
